  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero small-hero">
    <nav class="nav">
      <div class="brand">LE TEMPLE</div>
      <button class="menu-toggle" type="button" aria-label="Ouvrir le menu" data-i18n="menu">Menu</button>
      <div class="menu">
        <a href="index.html" data-i18n="nav_home">Accueil</a>
        <a href="concept.html" data-i18n="nav_concept">Concept</a>
        <a href="cabines.html" data-i18n="nav_cabins">Cabines</a>
        <a href="soins.html" data-i18n="nav_care">Soins</a>
        <a href="jeu.html" data-i18n="nav_game">Jeu</a>
        <a href="reservation.html" data-i18n="nav_booking">Reservation</a>
        <a href="contact.html" data-i18n="nav_contact">Contact</a>
        <a href="connexion.html" data-i18n="nav_login">Connexion</a>
      </div>
      <button class="lang-toggle" type="button" data-lang-toggle>EN</button>
      <a class="cta" href="reservation.html" data-i18n="cta_book">Reserver</a>
    </nav>
    <div class="hero-content reveal">
      <p class="eyebrow">Espace client</p>
      <h1>Connexion</h1>
    </div>
  </header>

  <main>
    <section class="section reveal form-section">
      <h2>Se connecter</h2>
      <form class="spa-form api-form" data-endpoint="/api/auth/login">
        <label>Email
          <input type="email" name="email" required>
        </label>
        <label>Mot de passe
          <input type="password" name="password" required>
        </label>
        <button type="submit" class="cta">Acceder a mon compte</button>
        <p class="form-status" data-form-status aria-live="polite"></p>
      </form>
    </section>

    <section class="section reveal form-section">
      <h2>Creer un compte</h2>
      <form class="spa-form api-form" data-endpoint="/api/auth/register">
        <label>Nom complet
          <input type="text" name="nom" required>
        </label>
        <label>Email
          <input type="email" name="email" required>
        </label>
        <label>Mot de passe (8 caracteres minimum)
          <input type="password" name="password" minlength="8" required>
        </label>
        <button type="submit" class="cta">Creer mon compte</button>
        <p class="form-status" data-form-status aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>Le Temple - 2026</p>`r`n    <a class="employee-link" href="employes.html">Acces employe</a>
  </footer>
  <script src="script.js"></script>
</body>
</html>
